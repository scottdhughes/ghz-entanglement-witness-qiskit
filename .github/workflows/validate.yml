name: validate

on:
  push:
  pull_request:

jobs:
  ghz-local:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run local GHZ witness
        run: python ghz_witness.py --mode local --qubits 12 --phase-points 13
